spring.application.name=salonflow
# DATABASE
# If DB_URL is not provided, fall back to an in-memory H2 for local verification
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
# Let Spring Boot detect driver based on JDBC URL and available drivers on the classpath
# (do not hard-code driver-class-name to avoid mismatch when DB_URL points to another DB)

# Server port override for local runs
server.port=9090

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# MinIO
minio.endpoint=http://localhost:9000
minio.access-key=admin
minio.secret-key=password123
minio.bucket-name=salon-images
# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200